<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milk Me Not — Plant-based milk ratings & reviews</title>
    <meta name="description" content="Discover and rate plant-based milks. Read real reviews from a community obsessed with taste — find the perfect oat, almond, soy or coconut milk for coffee, cereal and cooking." />
    <meta name="author" content="Milk Me Not" />
    <link rel="icon" href="/lovable-uploads/9f030b65-074a-4e64-82d9-f0eba7246e1a.png" type="image/png" />

    <!-- Open Graph / social -->
    <meta property="og:title" content="Milk Me Not — Plant-based milk ratings & reviews" />
    <meta property="og:description" content="Discover and rate plant-based milks. Real reviews from a community obsessed with taste." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://milkmenot.com/" />
    <meta property="og:image" content="https://milkmenot.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Milk Me Not — Plant-based milk ratings & reviews" />
    <meta name="twitter:description" content="Discover and rate plant-based milks. Real reviews from a community obsessed with taste." />
    <meta name="twitter:image" content="https://milkmenot.com/og-image.png" />

    <!-- Sitewide structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Milk Me Not",
        "url": "https://milkmenot.com",
        "logo": "https://milkmenot.com/lovable-uploads/9f030b65-074a-4e64-82d9-f0eba7246e1a.png"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Milk Me Not",
        "url": "https://milkmenot.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://milkmenot.com/results?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Minimal FOUC prevention - fade in instead of blocking LCP -->
    <style>
      html:not(.ready) body { opacity: 0; }
      html.ready body { opacity: 1; transition: opacity 0.1s ease-in; }
    </style>

    <!-- Design system fonts: Plus Jakarta Sans (display/headlines) + DM Sans (body/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Preconnect to Supabase to reduce critical request chain -->
    <link rel="preconnect" href="https://jtabjndnietpewvknjrm.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jtabjndnietpewvknjrm.supabase.co">

    <!-- Security meta tags (static, no JS needed) -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  </head>
  <body>
    <!-- Native app splash screen - shows immediately before React loads -->
    <div id="native-splash" style="
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #00bf63 0%, #00a855 100%);
    ">
      <div style="
        width: 96px;
        height: 96px;
        background: white;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        margin-bottom: 32px;
      ">
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#00bf63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2h8"/>
          <path d="M9 2v2.789a4 4 0 0 1-.672 2.219l-.656.984A4 4 0 0 0 7 10.212V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-9.789a4 4 0 0 0-.672-2.219l-.656-.984A4 4 0 0 1 15 4.788V2"/>
          <path d="M7 15a6.472 6.472 0 0 1 5 0 6.47 6.47 0 0 0 5 0"/>
        </svg>
      </div>
      <h1 style="
        font-size: 1.875rem;
        font-weight: 700;
        color: white;
        margin: 0 0 8px 0;
        font-family: system-ui, -apple-system, sans-serif;
      ">Plant Milk Reviews</h1>
      <p style="
        font-size: 1.125rem;
        color: rgba(255, 255, 255, 0.8);
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      ">Ditch the Moo. Find Your New!</p>
      <div style="
        position: absolute;
        bottom: 64px;
        display: flex;
        gap: 6px;
      ">
        <div class="splash-dot" style="width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 0.8s ease-in-out infinite;"></div>
        <div class="splash-dot" style="width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 0.8s ease-in-out infinite 0.2s;"></div>
        <div class="splash-dot" style="width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 0.8s ease-in-out infinite 0.4s;"></div>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 0.5; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.3); }
        }
      </style>
    </div>
    <script>
      // Show native splash immediately if running in Capacitor
      (function() {
        var isNative = typeof window !== 'undefined' &&
          window.Capacitor &&
          window.Capacitor.isNativePlatform &&
          window.Capacitor.isNativePlatform();
        if (isNative) {
          document.getElementById('native-splash').style.display = 'flex';
        }
      })();
    </script>
    <div id="root"></div>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
